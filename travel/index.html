<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#102030">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Travel Plans">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Travel Plans</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="stylesheet" href="./styles.css?v=3">
</head>
<body>
  <header>
    <div class="top-row">
      <div>
        <p class="eyebrow">Private Utility</p>
        <h1>Travel Plans</h1>
      </div>
      <div class="auth-actions">
        <span id="userLabel" class="user-label">Signed out</span>
        <button id="signInBtn" type="button">Sign in</button>
        <button id="signOutBtn" type="button" hidden>Sign out</button>
      </div>
    </div>

    <div id="signedInControls" class="toolbar" hidden>
      <button id="prevMonthBtn" class="icon-button" type="button" aria-label="Previous month">‹</button>
      <label class="month-select-label">
        <span>Month</span>
        <select id="monthSelect"></select>
      </label>
      <button id="nextMonthBtn" class="icon-button" type="button" aria-label="Next month">›</button>
      <button id="refreshBtn" class="icon-button" type="button" aria-label="Refresh plans">↻</button>
      <label class="icon-button import-label" aria-label="Upload text files">
        <input id="importFile" type="file" accept="text/plain,.txt" multiple>
        <span aria-hidden="true">＋</span>
      </label>
    </div>
  </header>

  <main>
    <div class="meta-bar">
      <span id="status">Sign in with Google to load private travel plans.</span>
    </div>
    <section id="monthOverview" class="month-overview" aria-live="polite"></section>
    <section id="weekList" class="week-list" aria-live="polite"></section>
    <p id="empty" class="empty">Sign in with an allowed Google account to view private travel plans.</p>
  </main>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
    }
  </script>
  <script type="module" src="./app.js?v=3"></script>
</body>
</html>
