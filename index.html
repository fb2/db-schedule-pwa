<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#071f33" />
    <meta name="description" content="Fast ferry schedule for Discovery Bay, Hong Kong." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="DB Ferry" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <title>DB Ferry</title>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div>
          <p class="eyebrow">Discovery Bay ferry</p>
          <h1 id="routeTitle">DB to Central</h1>
        </div>
        <button id="flipDirection" class="icon-button" type="button" aria-label="Flip direction">⇄</button>
      </header>

      <section class="card next-card" aria-live="polite">
        <div class="next-label">Next catchable ferry</div>
        <div id="nextTime" class="next-time">--:--</div>
        <div id="countdown" class="countdown">Checking schedule...</div>
        <div id="departureMeta" class="departure-meta"></div>
      </section>

      <section class="controls card">
        <label>
          Route
          <select id="routeSelect"></select>
        </label>
        <label>
          Direction
          <select id="directionSelect"></select>
        </label>
        <label>
          Day type
          <select id="dayOverride">
            <option value="auto">Auto: today in HK</option>
            <option value="weekday">Weekday</option>
            <option value="saturday">Saturday</option>
            <option value="sundayPH">Sunday / public holiday</option>
          </select>
        </label>
        <label>
          Walk buffer
          <select id="walkBuffer">
            <option value="0">0 min</option>
            <option value="5">5 min</option>
            <option value="10" selected>10 min</option>
            <option value="15">15 min</option>
            <option value="20">20 min</option>
          </select>
        </label>
      </section>

      <section class="card upcoming-card">
        <div class="section-heading">
          <h2>Upcoming</h2>
          <span id="activeDayType"></span>
        </div>
        <ol id="upcomingList" class="upcoming-list"></ol>
      </section>

      <section class="card source-card">
        <h2>Source</h2>
        <p id="sourceText"></p>
        <a id="sourceLink" href="#" target="_blank" rel="noreferrer">Open official schedule</a>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
